# Docker Compose — LLD Admin Panel
#
# Django Admin Panel für die LLD-Infrastruktur.
#
# Diese Anwendung wird hinter dem Nginx Reverse Proxy gehostet.
# Sie ist nur über das interne Docker-Netzwerk erreichbar.
#
# Sprint 4.2.1: Minimale Service-Definition
# - Build aus lokalem Repository: ../lld-panel
# - Internt in lld-Netzwerk
# - Noch keine Ports, DB, Env-Vars, oder Konfiguration
#
# Zukünftige Integration (Sprint 5+):
# - PostgreSQL-Verbindung
# - Reverse Proxy Routing (Domain: panel.lukasleimer.dev)
# - SSL/HTTPS Konfiguration
# - Environment-Variablen & Secrets
# - Healthcheck
# - Volumes für Daten
#
# Abhängigkeiten:
# - Docker Network 'lld' (zentral definiert in root docker-compose.yml)
# - Lokales Repository: ../lld-panel mit Dockerfile

services:
  panel:
    # Build aus lokalem Django-Repository
    # Dockerfile erwartet unter: ../lld-panel/Dockerfile
    build:
      context: ../lld-panel
    
    # Container-Identifikation
    container_name: lld-panel
    
    # Netzwerk-Membership
    # Intern im lld-Netzwerk (nicht öffentlich)
    networks:
      - lld
    
    # Automatischer Neustart bei Fehler
    # unless-stopped: Startet neu außer wenn manuell gestoppt
    restart: unless-stopped
