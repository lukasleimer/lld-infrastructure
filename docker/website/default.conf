# Nginx Configuration — LLD Website
#
# Leichte Nginx-Konfiguration zum Ausliefern von statischen HTML-Dateien
#
# Dieser Server Block:
# - Lauscht auf Port 80
# - Serviert statische Dateien aus /usr/share/nginx/html
# - Kompression für bessere Performance
# - Health-Endpoint

server {
    listen 80;
    listen [::]:80;
    
    server_name _;
    
    root /usr/share/nginx/html;
    index index.html index.htm;
    
    # Kompression aktivieren
    gzip on;
    gzip_types text/html text/plain text/css text/javascript application/json;
    gzip_min_length 1000;
    
    # Cache-Control für statische Assets
    location ~* \.(jpg|jpeg|png|gif|ico|css|js)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    # Standard-Requests
    location / {
        try_files $uri $uri/ =404;
    }
}
