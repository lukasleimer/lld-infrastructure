# Docker Compose — Basis-Template (DEPRECATED)
#
# ⚠️ DEPRECATED: Diese Datei wird nicht mehr verwendet.
#
# Die zentrale Orchestrierung erfolgt über:
#   → docker-compose.yml (ROOT)
#
# Das ROOT docker-compose.yml ist die Single Source of Truth für:
# - Alle Include-Direktiven
# - Alle Netzwerk-Definitionen
# - Alle Volume-Definitionen
#
# Service-Definitionen befinden sich in:
# - docker/compose/database.yml (PostgreSQL)
# - docker/compose/proxy.yml (Nginx)
# - docker/compose/website.yml (Website)
# - docker/compose/panel.yml (Panel - später)
# - docker/compose/monitoring.yml (Monitoring - später)
#
# Verwendung:
#   docker compose up -d    # Startet alle Services
#   docker compose config   # Validiert die Konfiguration
#   docker compose logs -f  # Zeigt alle Logs
#
# Diese Datei kann gelöscht werden.
