<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLD Infrastructure Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            text-align: center;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 32px;
        }
        .subtitle {
            color: #666;
            font-size: 18px;
            margin-bottom: 30px;
        }
        .status {
            background: #4CAF50;
            color: white;
            padding: 15px 30px;
            border-radius: 5px;
            display: inline-block;
            font-size: 16px;
            margin-bottom: 30px;
            font-weight: 600;
        }
        .info {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 5px;
            margin-top: 20px;
            text-align: left;
        }
        .info-item {
            margin: 10px 0;
            color: #555;
            font-family: 'Courier New', monospace;
            font-size: 14px;
        }
        .info-label {
            font-weight: 600;
            color: #333;
        }
        .footer {
            margin-top: 30px;
            color: #999;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 LLD Infrastructure</h1>
        <p class="subtitle">Website Service Test</p>
        
        <div class="status">✓ Running</div>
        
        <div class="info">
            <div class="info-item">
                <span class="info-label">Service:</span> lld-website
            </div>
            <div class="info-item">
                <span class="info-label">Environment:</span> Testing
            </div>
            <div class="info-item">
                <span class="info-label">Network:</span> lld (Docker)
            </div>
            <div class="info-item">
                <span class="info-label">Type:</span> Placeholder (Nginx)
            </div>
            <div class="info-item">
                <span class="info-label">Purpose:</span> End-to-End Infrastructure Test
            </div>
        </div>
        
        <div class="footer">
            <p>This is a placeholder website for infrastructure testing.</p>
            <p>The real website will be deployed in later sprints.</p>
        </div>
    </div>
</body>
</html>
