# Diese Datei wird später mit:
# - Virtual Hosts für einzelne Domains
# - Proxy-Pass-Regeln zu internen Services
# - SSL-Konfiguration
# ergänzt.
#
# Status: Placeholder (Sprint 4)

# Standard Nginx Server Block — Testing und Routing
server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name _;

    # Health-Check Endpoint
    # Wird von Docker Healthcheck verwendet
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # Temporärer Test-Redirect zur Website
    # Später: Eigene Virtual Hosts pro Domain
    location / {
        # Test: Alle Requests zur Website-Service (lld-website)
        # Für echtes Routing später:
        # - if ($host ~* ^panel\.lukasleimer\.dev$) { proxy_pass http://panel; }
        # - if ($host ~* ^lukasleimer\.dev$) { proxy_pass http://website; }
        proxy_pass http://website/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

