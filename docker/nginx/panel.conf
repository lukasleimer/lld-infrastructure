# Nginx Configuration — LLD Admin Panel Reverse Proxy
#
# Reverse Proxy für Django Admin Panel.
#
# Dieser Server Block:
# - Lauscht auf Port 80
# - Domain: panel.lukasleimer.dev
# - Proxy zu Django Panel Service (lld-panel:8000)
# - HTTP/1.1 mit Connection Upgrade Support
# - Forwarded Headers für Client-Information
# - 25MB Max Body für File Uploads
#
# Abhängigkeiten:
# - Service: lld-panel (Docker Container)
# - Port: 8000 (Internal, nur Docker Network)
# - Domain: panel.lukasleimer.dev (DNS muss auflösen)
#
# Zukünftige Integration (Sprint 7):
# - SSL/HTTPS (Port 443)
# - HSTS Header
# - HTTP→HTTPS Redirect
# - Rate Limiting
# - Caching Strategien

server {
    listen 80;
    listen [::]:80;

    # Virtual Host für Admin Panel
    server_name panel.lukasleimer.dev;

    # Maximum Body Size für Uploads
    # Django Panel: File-Uploads bis 25MB
    client_max_body_size 25M;

    # Reverse Proxy zum Django Panel Service
    location / {
        # Proxy Pass zu Panel Service
        # DNS: lld-panel = Container Name (Docker DNS Auflösung)
        proxy_pass http://lld-panel:8000;

        # HTTP Protocol Version
        # HTTP/1.1 für Connection Keep-Alive und Upgrade
        proxy_http_version 1.1;

        # Connection Management
        # Leer = Connection Upgrade Headers unterstützen (WebSocket, etc)
        proxy_set_header Connection "";

        # Client Information Headers
        # Diese Headers ermöglichen der App zu sehen:
        # - Wer der echte Client ist (nicht der Proxy)
        # - Original Request Protocol
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Upgrade Support
        # Ermöglicht WebSocket und andere Upgrade-basierte Protokolle
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        # Lange-laufende Requests (z.B. Datei-Uploads)
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;

        # Buffering
        # Disable Buffering für direktes Streaming
        proxy_buffering off;
    }
}
