# Docker Compose — Zentrale Basis der LLD-Infrastruktur
#
# Diese Datei definiert gemeinsame Ressourcen für alle Services:
# - Docker-Netzwerk (lld)
# - Gemeinsame Volumes
# - Basis-Konfiguration
#
# Verwendung:
# Diese Datei wird als Grundlage verwendet. Weitere Services werden
# in separaten Dateien definiert und später mit Includes verknüpft.

version: '3.9'

# Gemeinsame Netzwerk-Definition
# Alle Services verbinden sich mit diesem Netzwerk
networks:
  lld:
    name: lld
    driver: bridge

# Gemeinsame Volumes (falls benötigt)
volumes:
  # Volumes werden pro Service in deren Dateien definiert
  # Hier Platzhalter für globale Volumes
