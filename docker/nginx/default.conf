# Nginx Configuration — LLD Reverse Proxy
#
# Zentrale Reverse Proxy Konfiguration für die LLD-Infrastruktur.
#
# Dieser Server Block:
# - Lauscht auf Port 80 (öffentlich)
# - Routing zu internen Services
# - Health-Endpoint für Docker Healthcheck
# - HTTP zu interne Services
# - Headers korrekt weitergeleitet
#
# Zukünftige Erweiterungen (Sprint 7):
# - SSL/HTTPS (Port 443)
# - Domain-basiertes Routing (Virtual Hosts)
# - Multi-Service Routing (panel, website, customer-sites)
# - HSTS + HTTP→HTTPS Redirect

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name _;

    # Health Check Endpoint
    # Wird von Docker Healthcheck verwendet
    # Schnelle Response ohne Backend-Proxy
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # Main Routing
    # Alle Requests → Website Service
    # Later: Domain-based routing hier
    location / {
        # Proxy Pass zu Website-Service
        # DNS: website = lld-website Container (Docker DNS)
        proxy_pass http://website/;
        
        # Headers: Client Information
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Connection Settings
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}