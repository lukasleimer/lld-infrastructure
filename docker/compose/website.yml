# Docker Compose — LLD Website Service
#
# Website-Service für die LLD-Infrastruktur.
# 
# Dieser Service stellt statische HTML-Dateien bereit und ist nur über
# den Nginx Reverse Proxy von außen erreichbar (port 80).
#
# Rolle:
# - Serving statischer HTML-Inhalte
# - Test-Service für Infrastruktur-Validierung
# - Platzhalter für echte Website-Anwendung (zukünftig)
#
# Architektur:
# - Docker Image: nginx:1.26-alpine (lightweight, versioned)
# - Netzwerk: lld (bridge, intern)
# - Ports: Keine öffentlich (nur proxy access)
# - Volumes: HTML + Config (read-only)
# - Healthcheck: HTTP GET /
# - Restart: Unless-Stopped (auto-recovery)
#
# Zukünftige Erweiterungen (Sprint 7+):
# - Echte Website-Anwendung (z.B. Astro, Next.js)
# - SSL/HTTPS Support
# - Domain-basiertes Routing
# - Custom Application Framework
#
# Abhängigkeiten:
# - Nginx Reverse Proxy (proxy.yml) — für externe Erreichbarkeit
# - Docker Network 'lld' — zentral definiert in root docker-compose.yml

services:
  website:
    # Alpine Nginx: Leicht, schnell, sicher
    # Versioned (nicht 'latest') für Reproduzierbarkeit
    image: nginx:1.26-alpine
    
    # Container Name: Eindeutig identifizierbar
    # DNS Name: 'website' (Docker DNS im lld Netzwerk)
    container_name: lld-website
    
    # Netzwerk Membership
    # lld: Bridge network (intern, nicht öffentlich)
    networks:
      - lld
    
    # Volumes: Statische Dateien + Konfiguration
    volumes:
      # HTML Content (read-only aus Sicherheit)
      # Host Path: ./../../docker/website/html/ (relative zur docker-compose.yml in root)
      # Container Path: /usr/share/nginx/html (Nginx default)
      - ./../../docker/website/html:/usr/share/nginx/html:ro
      
      # Nginx Konfiguration (read-only)
      # Bind-Mount für Configuration-as-Code
      # Änderungen im Host sind sofort sichtbar (für Testing)
      - ./../../docker/website/default.conf:/etc/nginx/conf.d/default.conf:ro
    
    # Restart Policy
    # unless-stopped: Auto-recovery bei Container-Crash
    # Bleibt stopped wenn manuell gestoppt
    restart: unless-stopped
    
    # Health Check
    # Prüft ob Website http://localhost/ antwortet
    # Verwendung: Docker ps zeigt Status (healthy/unhealthy)
    # Verwendung: Docker Compose nutzt für Service Dependencies
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

