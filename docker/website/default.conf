# Nginx Configuration — LLD Website Service
#
# Konfiguration für statische HTML-Dateien im Website-Service.
#
# Server Block:
# - Lauscht auf Port 80
# - Root: /usr/share/nginx/html
# - Index: index.html
# - Gzip: Global konfiguriert (nicht hier duplizieren)
# - Cache: Pro Asset-Typ
# - Security: Standard-Header

server {
    listen 80;
    listen [::]:80;
    
    # Any hostname (wird über Reverse Proxy aufgerufen)
    server_name _;
    
    # Root directory (gemountet von Host)
    root /usr/share/nginx/html;
    
    # Default Index Files
    index index.html index.htm;
    
    # Security Headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Long-term Caching für statische Assets
    location ~* \.(jpg|jpeg|png|gif|svg|ico|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }
    
    # Medium Caching für CSS/JS
    location ~* \.(css|js)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }
    
    # Default Location: Serve HTML Files
    location / {
        # Try file, then directory, then 404
        try_files $uri $uri/ =404;
        
        # HTML: No Cache (für schnelle Updates)
        add_header Cache-Control "public, max-age=0, must-revalidate";
    }
    
    # Error Pages
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
}
